spring:
  application:
    name: AI-SaaS
  datasource:
    url: jdbc:postgresql://localhost:5432/ai_support_saas
    username: postgres
    password: 1234
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080

app:
  jwt:
    secret: your_super_secret_key_make_it_long_at_least_32_chars
    expiration: 86400000